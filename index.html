<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-64UC4BEhTGwk3eGpak4nO2jqtl7liTS+juXkSJ2gPAQPmlClQO7s5UgCeR6US48g" crossorigin="anonymous">
    <style>
              body {
  background-color: #262626;
  margin: 0;
  font-family: sans-serif;
}

#welcomeOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    /* 背景画像 */
    background: url("welcome3.png") no-repeat center center;
    background-size: 100% auto;
background-position: center top;
}

/* 入力欄とボタンの見た目 */
#welcomeOverlay input,
#welcomeOverlay button {
    padding: 10px;
    font-size: 16px;
    margin: 10px;
}

/* フェードアウト用 */
.fade-out {
    opacity: 0;
    transition: opacity 1s;
}

/* 共通（白文字・絶対配置） */
.l {
  color: white;
  position: absolute;
  margin: 0;
}

/* ===== ロゴ ===== */
img {
  position: absolute;
  top: 0;
  left: 0;
  width: 385px;
  height: 81px;
}

/* ===== メイン情報（ロゴより下に配置） ===== */

/* 現在駅 */
#currentsta {
  font-size: 32px;
  top: 85px;  /* ← 100px → 85px に変更 */
  left: 20px;
}

/* 現在時刻 */
#currenttime {
  font-size: 20px;
  top: 100px;
  right: 20px;
}

/* 出発時刻（重要） */
#depttime {
  font-size: 120px !important;
  top: 140px !important;
  left: 20px !important;
  font-weight: bold;
}

/* 列車番号（重要） */
#trainnum {
  font-size: 120px !important;
  top: 140px !important;
  left: 420px !important;
  font-weight: bold;
}

/* 補助情報 */
#from {
  font-size: 22px;
  top: 300px;
  left: 20px;
}

#to {
  font-size: 22px;
  top: 330px;
  left: 20px;
}

#currentwhere {
  font-size: 20px;
  top: 370px;
  left: 20px;
}

#Approval {
  font-size: 26px;
  top: 410px;
  left: 20px;
}

/* 小さい情報 */
#mycode {
  font-size: 18px;
  top: 100px;
  left: 250px;
}

#myrole {
  font-size: 18px;
  top: 100px;
  left: 300px;
}

#exlc {
  font-size: 18px;
  top: 100px;
  left: 360px;
}

/* 出力 */
#output {
  font-size: 18px;
  top: 500px;
  left: 20px;
}

/* ===== 入力エリア ===== */
#input {
  position: absolute;
  top: 540px;
  left: 20px;
  width: 400px;
  font-size: 18px;
  padding: 5px;
}

#submitswitch {
  position: absolute;
  top: 540px;
  left: 440px;
  font-size: 16px;
}

#renew {
  position: absolute;
  top: 540px;
  left: 520px;
  font-size: 16px;
}

/* ===== ボタンエリア ===== */
#eki {
  position: absolute;
  top: 600px;
  left: 20px;
}

#eki button {
  font-size: 18px;
  margin-right: 10px;
  padding: 8px 12px;
}
#spinner {
    display: none;
    margin-top: 20px;
}
    </style>
    <title>TRTCOS - Tsurumai Line Train Communication & Operating Systems</title>
  </head>
<body>

  <div id="welcomeOverlay">
    <div id="spinner" class="spinner-border text-light" role="status">
      <span class="visually-hidden">Loading...</span>
  </div>
    <input type="text" placeholder="名前を入力">
    <button id="startBtn">スタート</button>
</div>
<div id="mainContent">
    <img src="logoone.png" alt="kibi">
<!--<input id="input">-->
<p class="l" id="output">439</p>
<input id="input" type="text" width="600" placeholder="ここに送信するコードを入力">
<button id="submitswitch">送信</button>
<button id="renew">更新</button>
<p class="l" id="currentsta" >上小田井</p>
<p class="l" id="mycode">042</p>
<p class="l" id="myrole">駅員</p>
<p class="l" id="depttime">13:42</p>
<p class="l" id="trainnum" >201</p>
<p class="l" id="exlc">Loc</p>
<p class="l" id="from">Fushimi</p>
<p class="l" id="to">Toyotashi</p>
<p class="l" id="currentwhere">Irinaka --> Yagoto</p>
<p class="l" id="Approval" style="color:red;">近づいています</p>
<p class="l" id="currenttime">現在 23:14</p>
<div id="eki">
<button class="all" id="button" >ReadyGo</button>
<button class="two" id="stopbut">電車を停車させる／出庫させる</button>
<button class="eki" id="departbut">電車を発車させる</button>
</div>
<div id="shako"></div>
</div>
<script src="app.js">
</script>

</body>
</html>
