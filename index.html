<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
body {
  margin: 0;
  background-color: #262626;
  font-family: sans-serif;
  overflow-x: hidden;
}

/* ================= 共通 ================= */

.l,
.r {
  position: absolute;
  color: white;
  margin: 0;
}

button,
input {
  font-size: 16px;
  box-sizing: border-box;
}

/* ================= ロゴ ================= */

img {
  position: absolute;
  top: 0;
  left: 0;
  width: 385px;
  height: 81px;
}

/* ================= 指令画面 ================= */

#shirei {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* canvas */

#canvas {
  position: absolute;
  top: 110px;
  left: 0;
}

/* 時刻入力 */

#timesetform {
  position: absolute;
  top: 20px;
  left: 420px;
  width: 170px;
  padding: 6px;
}

/* 倍率 */

#jikokubai {
  position: absolute;
  top: 20px;
  left: 610px;
  width: 90px;
  padding: 6px;
}

/* ラジオ */

label[for="autotime"] {
  position: absolute;
  top: 23px;
  left: 730px;
  color: white;
}

label[for="manualtime"] {
  position: absolute;
  top: 23px;
  left: 820px;
  color: white;
}

/* 時刻設定 */

#timeset {
  position: absolute;
  top: 18px;
  left: 930px;
  padding: 7px 14px;
}

/* ================= メイン画面 ================= */

#main {
  position: relative;
  width: 100vw;
  min-height: 100vh;
}

/* 現在駅 */

#currentsta {
  font-size: 34px;
  top: 88px;
  left: 20px;
  font-weight: bold;
}

/* 現在時刻 */

#currenttime {
  font-size: 20px;
  top: 92px;
  right: 20px;
}

/* 出発時刻 */

#depttime {
  font-size: 120px;
  font-weight: bold;
  top: 135px;
  left: 20px;
  line-height: 1;
}

/* 列車番号 */

#trainnum {
  font-size: 120px;
  font-weight: bold;
  top: 135px;
  left: 430px;
  line-height: 1;
}

/* 種別 */

#exlc {
  font-size: 28px;
  top: 285px;
  left: 30px;
  font-weight: bold;
}

/* 始発 */

#from {
  font-size: 24px;
  top: 335px;
  left: 20px;
}

/* 行先 */

#to {
  font-size: 24px;
  top: 375px;
  left: 20px;
}

/* 在線位置 */

#currentwhere {
  font-size: 22px;
  top: 425px;
  left: 20px;
}

/* 接近 */

#Approval {
  font-size: 28px;
  font-weight: bold;
  top: 475px;
  left: 20px;
}

/* 通過・停車 */

#passstop {
  font-size: 28px;
  font-weight: bold;
  top: 525px;
  left: 20px;
}

/* 残り時間 */

#nokori {
  font-size: 24px;
  top: 570px;
  left: 20px;
}

/* システムコード */

#mycode {
  font-size: 18px;
  top: 95px;
  left: 250px;
}

/* 役職 */

#myrole {
  font-size: 18px;
  top: 95px;
  left: 320px;
}

/* 出力ログ */

#output {
  font-size: 15px;
  top: 760px;
  left: 20px;
  width: 90vw;
  word-break: break-all;
  opacity: 0.8;
}

/* ================= 入力欄 ================= */

#input {
  position: absolute;
  top: 650px;
  left: 20px;
  width: 420px;
  padding: 8px;
}

/* 送信 */

#submitswitch {
  position: absolute;
  top: 650px;
  left: 460px;
  padding: 8px 14px;
}

/* 更新 */

#renew {
  position: absolute;
  top: 650px;
  left: 550px;
  padding: 8px 14px;
}

/* ================= 操作ボタン ================= */

#eki {
  position: absolute;
  top: 710px;
  left: 20px;
}

#eki button {
  margin-right: 12px;
  padding: 10px 16px;
  font-size: 18px;
}

/* ================= ボタン共通 ================= */

button {
  background-color: #404040;
  color: white;
  border: 1px solid #808080;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background-color: #505050;
}

/* ================= 入力欄共通 ================= */

input {
  background-color: #1f1f1f;
  color: white;
  border: 1px solid #808080;
  border-radius: 4px;
}
    </style>
    <title>TRTCOS - Tsurumai Line Train Communication & Operating Systems</title>
  </head>
<body>

  
  <!--<input id="input">-->
  <div id="shirei">
    <img src="logoone.png" class="t" alt="kibi">
    
    <input type="text" id="timesetform" placeholder="時刻（半角６桁）" class="t">
<input type="text" placeholder="時刻倍" class="t" id="jikokubai">
<label for="autotime" class="t"><input id="autotime" type="radio" name="automanu" class="t" value="自動"><span class="t" style="color:white">自動</span></label>
<label for="manualtime" class="t"><input id="manualtime" type="radio" name="automanu" class="t" value="手動"><span class="t" style="color:white" checked>手動</span></label>
<button id="timeset">時刻を設定</button>
<br>
<canvas id="canvas"></canvas>
  </div>
  <div id="main">
    <img src="logoone.png" alt="kibi">
  <p class="l" id="output">439</p>
  <input id="input" type="text" width="600" placeholder="ここに送信するコードを入力">
  <button id="submitswitch">送信</button>
  <button id="renew">更新</button>
  <p class="l" id="currentsta" >上小田井</p>
  <p class="l" id="mycode">042</p>
  <p class="l" id="myrole">駅員</p>
  <p class="l" id="depttime">13:42</p>
  <p class="l" id="trainnum" >201</p>
  <p class="l" id="exlc">Loc</p>
  <p class="l" id="from">Fushimi</p>
  <p class="l" id="to">Toyotashi</p>
  <p class="l" id="currentwhere">Irinaka --> Yagoto</p>
  <p class="l" id="Approval" style="color:rgb(223, 40, 40);">近づいています</p>
  <p class="l" id="currenttime">現在 23:14</p>
  <p class="r" id="passstop" style="color:#f9ff45">停車</p>
  <p class="r" id="nokori">あと３分</p>
  <div id="eki">
  <button class="all" id="button" >ReadyGo</button>
  <button class="two" id="stopbut">電車を停車させる／出庫させる</button>
  <button class="eki" id="departbut">電車を発車させる</button>
  </div>
  <div id="shako"></div>
  </div>

<script src="app.js">
</script>

</body>
</html>
