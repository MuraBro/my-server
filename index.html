<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
body{
    margin:0;
    background:#262626;
    overflow:hidden;
    font-family:sans-serif;
    color:white;
}

/* ================= 自動縮小 ================= */

#appscale{
    position:relative;
    width:1280px;
    height:900px;
    transform-origin:top left;
}

/* ================= 共通 ================= */

.l,
.r{
    position:absolute;
    margin:0;
    color:white;
    white-space:nowrap;
}

button,
input{
    box-sizing:border-box;
    font-family:sans-serif;
}

/* ================= ロゴ ================= */

img{
    position:absolute;
    top:0;
    left:0;
    width:385px;
    height:81px;
}

/* ================= メイン ================= */

#main{
    position:relative;
    width:1280px;
    height:900px;
}

/* ===== 左上 ===== */

#currentsta{
    top:92px;
    left:24px;
    font-size:34px;
    font-weight:bold;
}

#mycode{
    top:98px;
    left:250px;
    font-size:18px;
}

#myrole{
    top:98px;
    left:320px;
    font-size:18px;
}

/* ===== 時刻・列番 ===== */

#depttime{
    top:140px;
    left:25px;
    font-size:120px;
    font-weight:bold;
    line-height:1;
}

#trainnum{
    top:140px;
    left:470px;
    font-size:120px;
    font-weight:bold;
    line-height:1;
}

/* ===== 停車・通過 ===== */

#passstop{
    top:250px;
    left:760px;
    font-size:82px;
    font-weight:bold;
    color:#f9ff45;
}

/* ===== 残り時間 ===== */

#nokori{
    top:285px;
    left:40px;
    font-size:38px;
    font-weight:bold;
    color:#ffe45c;
}

/* ===== 現在時刻 ===== */

#currenttime{
    top:335px;
    left:40px;
    font-size:22px;
    opacity:0.9;
}

/* ===== 詳細情報 横並び ===== */

#exlc{
    top:395px;
    left:40px;
    font-size:34px;
    font-weight:bold;
}

#to{
    top:395px;
    left:170px;
    font-size:34px;
}

#currentwhere{
    top:401px;
    left:520px;
    font-size:28px;
    opacity:0.95;
}

/* ===== 接近表示 ===== */

#Approval{
    top:480px;
    left:40px;
    font-size:36px;
    font-weight:bold;
    color:#ff5d5d;
}

/* ===== 右側情報 ===== */

#rightpanel{
    position:absolute;
    top:150px;
    right:40px;
    width:260px;
}

/* ===== 入力 ===== */



#input{
    position:absolute;
    top:540px;
    left:30px;
    width:420px;
    padding:10px;
    font-size:18px;

    background:#1f1f1f;
    border:1px solid #666;
    border-radius:5px;
    color:white;
}

#submitswitch{
    position:absolute;
    top:540px;
    left:470px;
}

#renew{
    position:absolute;
    top:540px;
    left:560px;
}

/* ===== ボタン ===== */

#eki{
    position:absolute;
    top:630px;
    left:30px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

#eki button{
    padding:12px 18px;
    font-size:20px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* ReadyGo */

#button{
    background:#4b4b4b;
}

/* 停車 */

#stopbut{
    background:#c93d3d;
}

/* 発車 */

#departbut{
    background:#1c9eff;
}
#departbut{
    background:#f0cc01;
}

/* hover */

#button:hover{
    background:#666;
}

#stopbut:hover{
    background:#e14f4f;
}

#departbut:hover{
    background:#42b1ff;
}

#departbut:hover{
    background:#ffdd00;
}

/* ===== 出力 ===== */

#output{
    position:absolute;
    bottom:10px;
    left:20px;
    width:90%;
    font-size:14px;
    opacity:0.5;
    word-break:break-all;
}

/* ================= 指令画面 ================= */

#shirei{
    position:relative;
    width:1280px;
    height:900px;
}

#canvas{
    position:absolute;
    top:110px;
    left:0;
}

#timesetform{
    position:absolute;
    top:20px;
    left:420px;
    width:160px;
    padding:6px;
}

#jikokubai{
    position:absolute;
    top:20px;
    left:600px;
    width:90px;
    padding:6px;
}

label[for="autotime"]{
    position:absolute;
    top:23px;
    left:730px;
    color:white;
}

label[for="manualtime"]{
    position:absolute;
    top:23px;
    left:820px;
    color:white;
}

#timeset{
    position:absolute;
    top:18px;
    left:930px;
    padding:8px 16px;
}
    </style>
    <title>TRTCOS - Tsurumai Line Train Communication & Operating Systems</title>
  </head>
<body>

  
  <!--<input id="input">-->
  <div id="shirei">
    <img src="logoone.png" class="t" alt="kibi">
    
    <input type="text" id="timesetform" placeholder="時刻（半角６桁）" class="t">
<input type="text" placeholder="時刻倍" class="t" id="jikokubai">
<label for="autotime" class="t"><input id="autotime" type="radio" name="automanu" class="t" value="自動"><span class="t" style="color:white">自動</span></label>
<label for="manualtime" class="t"><input id="manualtime" type="radio" name="automanu" class="t" value="手動"><span class="t" style="color:white" checked>手動</span></label>
<button id="timeset">時刻を設定</button>
<br>
<canvas id="canvas"></canvas>
  </div>
  <div id="main">
    <img src="logoone.png" alt="kibi">
  <p class="l" id="output">439</p>
  <input id="input" type="text" width="600" placeholder="ここに送信するコードを入力" disabled>
  <button id="submitswitch" disabled>送信</button>
  <button id="renew" disabled>更新</button>
  <p class="l" id="currentsta" >上小田井</p>
  <p class="l" id="mycode">042</p>
  <p class="l" id="myrole">駅員</p>
  <p class="l" id="depttime">13:42</p>
  <p class="l" id="trainnum" >201</p>
  <p class="l" id="exlc">Loc</p>
  <p class="l" id="from">Fushimi</p>
  <p class="l" id="to">Toyotashi</p>
  <p class="l" id="currentwhere">Irinaka --> Yagoto</p>
  <p class="l" id="Approval" style="color:rgb(223, 40, 40);">近づいています</p>
  <p class="l" id="currenttime">現在 23:14</p>
  <p class="r" id="passstop" style="color:#f9ff45">停車</p>
  <p class="r" id="nokori">あと３分</p>
  <div id="eki">
  <button class="all" id="button" >ReadyGo</button>
  <button class="two" id="stopbut">電車を停車させる／出庫させる</button>
  <button class="eki" id="departbut">電車を発車させる</button>
  <button class="two" id="gotoprogress">プログレスモード</button>
  </div>
  <div id="shako"></div>
  </div>

<script src="app.js">
</script>

</body>
</html>
