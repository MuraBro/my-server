<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
body {
  margin: 0;
  background-color: #262626;
  font-family: sans-serif;
  overflow: hidden;
}

/* ================= 共通 ================= */

.l,
.r {
  position: absolute;
  color: white;
  margin: 0;
}

button,
input {
  font-size: 16px;
}

/* ================= ロゴ ================= */

img {
  position: absolute;
  top: 0;
  left: 0;
  width: 385px;
  height: 81px;
}

/* ================= 指令画面 ================= */

#shirei {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* canvas */
#canvas {
  position: absolute;
  top: 110px;
  left: 0;
}

/* 時刻入力 */
#timesetform {
  position: absolute;
  top: 20px;
  left: 420px;
  width: 160px;
  padding: 5px;
}

/* 倍率 */
#jikokubai {
  position: absolute;
  top: 20px;
  left: 600px;
  width: 100px;
  padding: 5px;
}

/* ラジオボタン */
label[for="autotime"] {
  position: absolute;
  top: 22px;
  left: 730px;
  color: white;
}

label[for="manualtime"] {
  position: absolute;
  top: 22px;
  left: 820px;
  color: white;
}

/* 時刻設定ボタン */
#timeset {
  position: absolute;
  top: 18px;
  left: 930px;
  padding: 6px 12px;
}

/* ================= メイン画面 ================= */

#main {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* 現在駅 */
#currentsta {
  font-size: 32px;
  top: 85px;
  left: 20px;
}

/* 現在時刻 */
#currenttime {
  font-size: 20px;
  top: 90px;
  right: 20px;
}

/* 出発時刻 */
#depttime {
  font-size: 120px;
  font-weight: bold;
  top: 130px;
  left: 20px;
}

/* 列車番号 */
#trainnum {
  font-size: 120px;
  font-weight: bold;
  top: 130px;
  left: 430px;
}

/* 種別 */
#exlc {
  font-size: 28px;
  top: 270px;
  left: 30px;
}

/* 行先 */
#from {
  font-size: 24px;
  top: 320px;
  left: 20px;
}

#to {
  font-size: 24px;
  top: 360px;
  left: 20px;
}

/* 現在位置 */
#currentwhere {
  font-size: 22px;
  top: 410px;
  left: 20px;
}

/* 接近表示 */
#Approval {
  font-size: 28px;
  font-weight: bold;
  top: 460px;
  left: 20px;
}

/* 通過・停車 */
#passstop {
  font-size: 28px;
  font-weight: bold;
  top: 510px;
  left: 20px;
}

/* 残り時間 */
#nokori {
  font-size: 24px;
  top: 550px;
  left: 20px;
}

/* コード */
#mycode {
  font-size: 18px;
  top: 90px;
  left: 250px;
}

/* 役職 */
#myrole {
  font-size: 18px;
  top: 90px;
  left: 320px;
}

/* 出力 */
#output {
  font-size: 16px;
  top: 700px;
  left: 20px;
  max-width: 90vw;
  word-break: break-all;
}

/* ================= 入力欄 ================= */

#input {
  position: absolute;
  top: 740px;
  left: 20px;
  width: 420px;
  padding: 6px;
}

/* ボタン */
#submitswitch {
  position: absolute;
  top: 740px;
  left: 460px;
}

#renew {
  position: absolute;
  top: 740px;
  left: 540px;
}

/* ================= 操作ボタン ================= */

#eki {
  position: absolute;
  top: 800px;
  left: 20px;
}

#eki button {
  margin-right: 12px;
  padding: 10px 16px;
  font-size: 18px;
}
    </style>
    <title>TRTCOS - Tsurumai Line Train Communication & Operating Systems</title>
  </head>
<body>

  
  <!--<input id="input">-->
  <div id="shirei">
    <img src="logoone.png" class="t" alt="kibi">
    
    <input type="text" id="timesetform" placeholder="時刻（半角６桁）" class="t">
<input type="text" placeholder="時刻倍" class="t" id="jikokubai">
<label for="autotime" class="t"><input id="autotime" type="radio" name="automanu" class="t" value="自動"><span class="t" style="color:white">自動</span></label>
<label for="manualtime" class="t"><input id="manualtime" type="radio" name="automanu" class="t" value="手動"><span class="t" style="color:white" checked>手動</span></label>
<button id="timeset">時刻を設定</button>
<br>
<canvas id="canvas"></canvas>
  </div>
  <div id="main">
    <img src="logoone.png" alt="kibi">
  <p class="l" id="output">439</p>
  <input id="input" type="text" width="600" placeholder="ここに送信するコードを入力">
  <button id="submitswitch">送信</button>
  <button id="renew">更新</button>
  <p class="l" id="currentsta" >上小田井</p>
  <p class="l" id="mycode">042</p>
  <p class="l" id="myrole">駅員</p>
  <p class="l" id="depttime">13:42</p>
  <p class="l" id="trainnum" >201</p>
  <p class="l" id="exlc">Loc</p>
  <p class="l" id="from">Fushimi</p>
  <p class="l" id="to">Toyotashi</p>
  <p class="l" id="currentwhere">Irinaka --> Yagoto</p>
  <p class="l" id="Approval" style="color:rgb(223, 40, 40);">近づいています</p>
  <p class="l" id="currenttime">現在 23:14</p>
  <p class="r" id="passstop" style="color:#f9ff45">停車</p>
  <p class="r" id="nokori">あと３分</p>
  <div id="eki">
  <button class="all" id="button" >ReadyGo</button>
  <button class="two" id="stopbut">電車を停車させる／出庫させる</button>
  <button class="eki" id="departbut">電車を発車させる</button>
  </div>
  <div id="shako"></div>
  </div>

<script src="app.js">
</script>

</body>
</html>
